services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra
      POSTGRES_DB: orchestra
    ports:
      - "5433:5432"
    volumes:
      - ${HOME}/.orchestra/pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c wal_level=minimal
      -c max_wal_senders=0
      -c max_wal_size=128MB
      -c min_wal_size=32MB
      -c checkpoint_completion_target=0.5
      -c synchronous_commit=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra"]
      interval: 5s
      timeout: 3s
      retries: 10

  # redis: enable in Phase 2 (Redis Streams event bus)
