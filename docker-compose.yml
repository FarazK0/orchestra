services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra
      POSTGRES_DB: orchestra
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra"]
      interval: 5s
      timeout: 3s
      retries: 10

  # redis: enable in Phase 2 (Redis Streams event bus)
  # redis:
  #   image: redis:7
  #   ports:
  #     - "6380:6379"

volumes:
  pgdata:
