[alembic]
# %(here)s resolves to the directory containing this file (infra/)
script_location = %(here)s
# migrations live under infra/migrations/versions/
version_locations = %(here)s/migrations/versions

# DB URL is read from the environment in env.py; this placeholder keeps
# alembic happy for offline / autogenerate invocations.
sqlalchemy.url = postgresql+psycopg://orchestra:orchestra@localhost:5433/orchestra

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
